<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Red Flag</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>
<div class="container details-container">

    <!-- Header -->
    <div class="header details-header">
        <h1>Riepilogo Red Flag</h1>
    </div>

    <!-- Riepilogo -->
    <div class="form-container">
        <div class="form">

            <div class="form-group">
                <label>Codice</label>
                <div class="detail-value" th:text="${redflag.code}"></div>
            </div>

            <div class="form-group">
                <label>Titolo</label>
                <div class="detail-value" th:text="${redflag.title}"></div>
            </div>

            <div class="form-group">
                <label>Descrizione</label>
                <div class="detail-value" th:text="${redflag.description}"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Persona Coinvolta</label>
                    <div class="detail-value" th:text="${redflag.personInvolved}"></div>
                </div>
                <div class="form-group">
                    <label>Contesto</label>
                    <div class="detail-value" th:text="${redflag.context}"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Severità</label>
                <div class="detail-value">
                    <span th:if="${redflag.severity == 'low'}" class="severity-badge severity-low"><i class="fa-solid fa-circle-check"></i> Bassa</span>
                    <span th:if="${redflag.severity == 'medium'}" class="severity-badge severity-medium"><i class="fa-solid fa-circle-exclamation"></i> Media</span>
                    <span th:if="${redflag.severity == 'high'}" class="severity-badge severity-high"><i class="fa-solid fa-circle-radiation"></i> Alta</span>
                </div>
            </div>

            <div class="form-actions">
                <a href="/" class="btn btn-primary">Torna al catalogo</a>
            </div>

        </div>
    </div>
</div>

<!-- Toast di feedback -->
<div th:if="${success}" id="toast" class="toast" th:text="${success}"></div>

<script>
    const toast = document.getElementById('toast');
    if (toast) {
        setTimeout(() => toast.classList.add('toast-hide'), 5000);
    }
</script>

<style>

    .detail-value {
        padding: 12px;
        border-radius: 5px;
        background-color: white;
        color: #cf4538;
        font-size: 1em;
        min-height: 44px;
        word-break: break-word;
    }
</style>

</body>
</html>
